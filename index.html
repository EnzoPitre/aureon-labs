const PomodoroWidget = () => {
  const [timeLeft, setTimeLeft] = useState(25 * 60); const [isActive, setIsActive] = useState(false); const [mode, setMode] = useState('Focus');
  const totalTime = mode === 'Focus' ? 25 * 60 : 5 * 60; const progress = ((totalTime - timeLeft) / totalTime) * 100;
  
  useEffect(() => {
    let interval = null;
    if (isActive && timeLeft > 0) interval = setInterval(() => setTimeLeft(timeLeft - 1), 1000);
    else if (timeLeft === 0) { setIsActive(false); setMode(prev => prev === 'Focus' ? 'Pause' : 'Focus'); setTimeLeft(mode === 'Focus' ? 5 * 60 : 25 * 60); }
    return () => clearInterval(interval);
  }, [isActive, timeLeft, mode]);
  
  const formatTime = (s) => `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;
  
  return (
    <div className="flex flex-col items-center justify-center h-full relative">
      <div className="flex gap-2 mb-4">
        <button onClick={() => {setMode('Focus'); setTimeLeft(25*60); setIsActive(false);}} className={`text-xs font-medium px-3 py-1 rounded-full transition-colors ${mode === 'Focus' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'text-zinc-500 hover:text-zinc-300'}`}>Focus</button>
        <button onClick={() => {setMode('Pause'); setTimeLeft(5*60); setIsActive(false);}} className={`text-xs font-medium px-3 py-1 rounded-full transition-colors ${mode === 'Pause' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'text-zinc-500 hover:text-zinc-300'}`}>Pause</button>
      </div>
      <div className="text-4xl font-light tabular-nums tracking-tight text-white mb-4">{formatTime(timeLeft)}</div>
      <div className="w-full h-1 bg-zinc-800 rounded-full overflow-hidden mb-6"><div className="h-full bg-emerald-500 transition-all duration-1000 ease-linear shadow-[0_0_10px_rgba(16,185,129,0.8)]" style={{ width: `${100 - progress}%` }}></div></div>
      <div className="flex space-x-3">
        <button onClick={() => setIsActive(!isActive)} className="w-10 h-10 flex items-center justify-center rounded-full bg-zinc-800 text-white hover:bg-emerald-500 hover:text-black transition-all border border-white/5">{isActive ? <Pause size={16} fill="currentColor" /> : <Play size={16} fill="currentColor" className="ml-1" />}</button>
        <button onClick={() => { setIsActive(false); setTimeLeft(mode === 'Focus' ? 25 * 60 : 5 * 60); }} className="w-10 h-10 flex items-center justify-center rounded-full bg-zinc-800 text-zinc-400 hover:text-white transition-all border border-white/5"><RotateCcw size={16} /></button>
      </div>
    </div>
  );
};

const Whiteboard = () => {
  const canvasRef = useRef(null); const containerRef = useRef(null);
  const [isDrawing, setIsDrawing] = useState(false); const [color, setColor] = useState('#10b981'); const [brushSize, setBrushSize] = useState(3);
  
  useEffect(() => {
    const canvas = canvasRef.current; const container = containerRef.current; const ctx = canvas.getContext('2d');
    const resizeCanvas = () => {
      const rect = container.getBoundingClientRect(); if (rect.width === 0 || rect.height === 0) return;
      const dpr = window.devicePixelRatio || 1; const oldWidth = canvas.width; const oldHeight = canvas.height;
      let tempCanvas = null;
      if (oldWidth > 0 && oldHeight > 0) { tempCanvas = document.createElement('canvas'); tempCanvas.width = oldWidth; tempCanvas.height = oldHeight; const tempCtx = tempCanvas.getContext('2d'); if (tempCtx) tempCtx.drawImage(canvas, 0, 0); }
      canvas.width = rect.width * dpr; canvas.height = rect.height * dpr; canvas.style.width = `${rect.width}px`; canvas.style.height = `${rect.height}px`;
      ctx.scale(dpr, dpr); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      if (tempCanvas && tempCanvas.width > 0 && tempCanvas.height > 0) ctx.drawImage(tempCanvas, 0, 0, oldWidth / dpr, oldHeight / dpr);
    };
    resizeCanvas(); window.addEventListener('resize', resizeCanvas); setTimeout(resizeCanvas, 100); return () => window.removeEventListener('resize', resizeCanvas);
  }, []);
  
  const getCoordinates = (e) => { const rect = canvasRef.current.getBoundingClientRect(); const clientX = e.clientX || (e.touches && e.touches[0].clientX); const clientY = e.clientY || (e.touches && e.touches[0].clientY); return { x: clientX - rect.left, y: clientY - rect.top }; };
  const startDrawing = (e) => { const coords = getCoordinates(e.nativeEvent || e); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(coords.x, coords.y); setIsDrawing(true); };
  const draw = (e) => { if (!isDrawing) return; const coords = getCoordinates(e.nativeEvent || e); const ctx = canvasRef.current.getContext('2d'); ctx.strokeStyle = color; ctx.lineWidth = brushSize; ctx.lineTo(coords.x, coords.y); ctx.stroke(); };
  const stopDrawing = () => { if (isDrawing) { canvasRef.current.getContext('2d').closePath(); setIsDrawing(false); } };
  const clearCanvas = () => { const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); const dpr = window.devicePixelRatio || 1; ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr); };
  
  const downloadCanvas = () => {
    const canvas = canvasRef.current; const tempCanvas = document.createElement('canvas'); tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
    const ctx = tempCanvas.getContext('2d'); ctx.fillStyle = '#0b0f19'; ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height); ctx.drawImage(canvas, 0, 0);
    const link = document.createElement('a'); link.download = 'aureon-whiteboard.png'; link.href = tempCanvas.toDataURL('image/png'); link.click();
  };
  
  const colors = [{ value: '#10b981', name: 'Emerald' }, { value: '#3b82f6', name: 'Blue' }, { value: '#ef4444', name: 'Red' }, { value: '#f59e0b', name: 'Yellow' }, { value: '#fafafa', name: 'White' }];
  
  return (
    <div className="h-full flex flex-col bg-[#11151e] rounded-2xl border border-white/5 overflow-hidden shadow-2xl relative">
      <div className="flex flex-wrap items-center justify-between p-3 border-b border-white/5 bg-[#0b0f19]/50 gap-4">
        <h3 className="font-medium text-sm flex items-center gap-2 text-white"><PenTool size={16} className="text-emerald-500"/> Studio Créatif</h3>
        <div className="flex items-center gap-3">
          <div className="flex gap-2 bg-black/30 p-1.5 rounded-lg border border-white/5">{colors.map(c => (<button key={c.value} onClick={() => setColor(c.value)} className={`w-5 h-5 rounded-full transition-transform ${color === c.value ? 'ring-2 ring-offset-2 ring-offset-[#11151e] ring-emerald-500 scale-110' : 'hover:scale-110 opacity-70 hover:opacity-100'}`} style={{ backgroundColor: c.value }} title={c.name} />))}</div>
          <div className="flex gap-2">
            <button onClick={clearCanvas} className="p-2 bg-white/5 text-zinc-400 rounded-lg hover:bg-white/10 transition border border-white/5" title="Effacer"><RotateCcw size={16}/></button>
            <button onClick={downloadCanvas} className="p-2 bg-emerald-500/10 text-emerald-400 rounded-lg hover:bg-emerald-500 hover:text-black transition border border-emerald-500/20" title="Exporter PNG"><Download size={16}/></button>
          </div>
        </div>
      </div>
      <div className="flex-1 w-full relative cursor-crosshair overflow-hidden" ref={containerRef}><canvas ref={canvasRef} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={(e) => { e.preventDefault(); startDrawing(e); }} onTouchMove={(e) => { e.preventDefault(); draw(e); }} onTouchEnd={stopDrawing} className="absolute top-0 left-0 touch-none" /></div>
    </div>
  );
};

      {eventModal.isOpen && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setEventModal({isOpen: false, day: null})}></div>
          <div className="relative w-full max-w-sm bg-[#11151e] border border-white/10 rounded-2xl p-6 shadow-2xl animation-fade-in">
            <h3 className="text-lg font-semibold text-white mb-4 flex items-center gap-2"><CalendarPlus size={18} className="text-emerald-500"/> Événement le {eventModal.day}</h3>
            <form onSubmit={handleAddEvent} className="space-y-4">
              <input autoFocus required type="text" placeholder="Titre de l'événement..." value={eventForm.title} onChange={e=>setEventForm({...eventForm, title: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white focus:border-emerald-500/50" />
              <select value={eventForm.type} onChange={e=>setEventForm({...eventForm, type: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white appearance-none">
                <option value="study">Session de révision (Bleu)</option><option value="deadline">Date Limite (Vert)</option><option value="exam">Examen Important (Rouge)</option>
              </select>
              <div className="flex gap-2 justify-end pt-2">
                <button type="button" onClick={() => setEventModal({isOpen: false, day: null})} className="px-4 py-2 text-sm text-zinc-400 hover:text-white">Annuler</button>
                <button type="submit" className="px-4 py-2 text-sm bg-emerald-500 text-black font-semibold rounded-lg hover:bg-emerald-400">Ajouter</button>
              </div>
            </form>
          </div>
        </div>
      )}
      
    {/* Modale Tâches (Kanban) */}
      {taskModal.isOpen && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setTaskModal({ isOpen: false, task: null })}></div>
          <div className="relative w-full max-w-md bg-[#11151e] border border-white/10 rounded-2xl p-6 shadow-2xl animation-fade-in">
            <div className="flex justify-between items-center mb-6">
              <h3 className="text-xl font-semibold text-white">{taskModal.task ? 'Modifier la tâche' : 'Nouvelle Tâche'}</h3>
              <button onClick={() => setTaskModal({ isOpen: false, task: null })} className="text-zinc-500 hover:text-white"><X size={20}/></button>
            </div>
            <form onSubmit={saveTask} className="space-y-4">
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Titre</label>
                <input required type="text" value={taskForm.title} onChange={e=>setTaskForm({...taskForm, title: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white focus:border-emerald-500/50" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Lié au cours</label>
                  <select value={taskForm.course} onChange={e=>setTaskForm({...taskForm, course: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white appearance-none">
                    {courses.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                    <option value="Général">Général</option>
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Date</label>
                  <input required type="date" value={taskForm.date} onChange={e=>setTaskForm({...taskForm, date: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white [color-scheme:dark]" />
                </div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                 <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Priorité</label>
                    <div className="flex bg-black/30 rounded-lg p-1 border border-white/5">
                      <button type="button" onClick={()=>setTaskForm({...taskForm, priority: 'medium'})} className={`flex-1 py-1.5 rounded text-sm font-medium transition ${taskForm.priority === 'medium' ? 'bg-white/10 text-white' : 'text-zinc-500'}`}>Normal</button>
                      <button type="button" onClick={()=>setTaskForm({...taskForm, priority: 'high'})} className={`flex-1 py-1.5 rounded text-sm font-medium transition ${taskForm.priority === 'high' ? 'bg-red-500/20 text-red-400' : 'text-zinc-500'}`}>Urgent</button>
                    </div>
                 </div>
                 <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Statut</label>
                    <select value={taskForm.status} onChange={e=>setTaskForm({...taskForm, status: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white appearance-none">
                      <option value="todo">Planifié</option><option value="in_progress">En cours</option><option value="done">Terminé</option>
                    </select>
                 </div>
              </div>
              <div className="flex gap-3 pt-4 border-t border-white/5 mt-6">
                {taskModal.task && <button type="button" onClick={()=>deleteTask(taskModal.task.id)} className="px-4 py-2 bg-red-500/10 text-red-400 rounded-lg hover:bg-red-500/20 transition"><Trash2 size={18}/></button>}
                <button type="button" onClick={() => setTaskModal({ isOpen: false, task: null })} className="flex-1 py-2 bg-white/5 text-white rounded-lg hover:bg-white/10 transition">Annuler</button>
                <button type="submit" className="flex-1 py-2 bg-emerald-500 text-black font-semibold rounded-lg hover:bg-emerald-400 transition">Enregistrer</button>
              </div>
            </form>
          </div>
        </div>
      )}
      
    {/* Modale Cours */}
      {isCourseModalOpen && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsCourseModalOpen(false)}></div>
          <div className="relative w-full max-w-md bg-[#11151e] border border-white/10 rounded-2xl p-6 shadow-2xl animation-fade-in">
            <div className="flex justify-between items-center mb-6">
              <h3 className="text-xl font-semibold text-white">{courseForm.id ? 'Modifier le cours' : 'Nouveau Cours'}</h3>
              <button onClick={() => setIsCourseModalOpen(false)} className="text-zinc-500 hover:text-white"><X size={20}/></button>
            </div>
            <form onSubmit={handleSaveCourse} className="space-y-4">
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Nom de la matière</label>
                <input required type="text" value={courseForm.name} onChange={handleCourseNameChange} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white focus:border-emerald-500/50" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div><label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Code (Auto)</label><input required type="text" value={courseForm.code} onChange={e=>setCourseForm({...courseForm, code: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white" /></div>
                <div><label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Professeur</label><input type="text" value={courseForm.professor} onChange={e=>setCourseForm({...courseForm, professor: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white" /></div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div><label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Moyenne (/20)</label><input type="number" step="0.1" max="20" value={courseForm.grade} onChange={e=>setCourseForm({...courseForm, grade: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white" /></div>
                <div>
                  <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Couleur</label>
                  <select value={courseForm.color} onChange={e=>setCourseForm({...courseForm, color: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white appearance-none">
                    {PRESET_COLORS.map(c => <option key={c.class} value={c.class}>{c.name}</option>)}
                  </select>
                </div>
              </div>
              <button type="submit" className="w-full mt-4 bg-emerald-500 text-black font-semibold py-2.5 rounded-lg hover:bg-emerald-400 transition">Enregistrer</button>
            </form>
          </div>
        </div>
      )}
      
    {/* Modale Ajout Module (Syllabus) */}
      {isModuleModalOpen && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 animation-fade-in">
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsModuleModalOpen(false)}></div>
          <div className="relative w-full max-w-sm bg-[#11151e] border border-white/10 rounded-2xl p-6 shadow-2xl">
            <h3 className="text-lg font-semibold text-white mb-4">Ajouter un chapitre</h3>
            <form onSubmit={handleSaveModule}>
              <input autoFocus required type="text" placeholder="Titre du chapitre..." value={moduleForm.title} onChange={e=>setModuleForm({...moduleForm, title: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-3 outline-none text-white mb-4 focus:border-emerald-500/50" />
              
              <div className="mb-4 flex items-center justify-between bg-black/20 p-3 rounded-lg border border-white/5">
                <span className="text-sm text-zinc-400 font-medium">Créer des sous-parties ?</span>
                <button type="button" onClick={() => setModuleForm({...moduleForm, hasSubparts: !moduleForm.hasSubparts})} className={`text-3xl transition-colors ${moduleForm.hasSubparts ? 'text-emerald-500' : 'text-zinc-600'}`}>
                  {moduleForm.hasSubparts ? <ToggleRight/> : <ToggleLeft/>}
                </button>
              </div>
 
            {moduleForm.hasSubparts && (
                <div className="space-y-2 mb-6 pl-2 border-l-2 border-white/5">
                  {moduleForm.subparts.map((sub, idx) => (
                    <div key={idx} className="flex items-center gap-2">
                      <CornerDownRight size={14} className="text-zinc-600"/>
                      <input required type="text" placeholder={`Titre sous-partie ${idx + 1}`} value={sub} onChange={e => {
                         const newSubs = [...moduleForm.subparts];
                         newSubs[idx] = e.target.value;
                         setModuleForm({...moduleForm, subparts: newSubs});
                       }} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white text-sm focus:border-emerald-500/50 transition-colors" />
                      {moduleForm.subparts.length > 1 && (
                        <button type="button" onClick={() => {
                           const newSubs = moduleForm.subparts.filter((_, i) => i !== idx);
                           setModuleForm({...moduleForm, subparts: newSubs});
                        }} className="text-zinc-500 hover:text-red-500 p-1"><X size={14}/></button>
                      )}
                    </div>
                  ))}
                  <button type="button" onClick={() => setModuleForm({...moduleForm, subparts: [...moduleForm.subparts, '']})} className="text-xs font-medium text-emerald-500 hover:text-emerald-400 flex items-center gap-1 mt-3 ml-6 transition-colors">
                    <Plus size={12}/> Ajouter une ligne
                  </button>
                </div>
              )}
      
            <div className="flex gap-2 justify-end">
                <button type="button" onClick={() => setIsModuleModalOpen(false)} className="px-4 py-2 text-sm text-zinc-400 hover:text-white transition">Annuler</button>
                <button type="submit" className="px-4 py-2 text-sm bg-emerald-500 text-black font-semibold rounded-lg hover:bg-emerald-400 transition shadow-[0_0_15px_rgba(16,185,129,0.2)]">Ajouter</button>
              </div>
            </form>
          </div>
        </div>
      )}
      
    {/* Modale Ajout Ressource (Fichiers locaux) */}
      {isResourceModalOpen && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 animation-fade-in">
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsResourceModalOpen(false)}></div>
          <div className="relative w-full max-w-md bg-[#11151e] border border-white/10 rounded-2xl p-6 shadow-2xl">
            <h3 className="text-lg font-semibold text-white mb-4">Ajouter une ressource</h3>
            
            {/* Tabs Fichier / Lien */}
            <div className="flex bg-black/30 rounded-lg p-1 border border-white/5 mb-4">
              <button onClick={() => setResourceUploadType('file')} className={`flex-1 py-1.5 rounded text-sm font-medium transition ${resourceUploadType === 'file' ? 'bg-white/10 text-white' : 'text-zinc-500 hover:text-zinc-300'}`}>Fichier Local</button>
              <button onClick={() => setResourceUploadType('link')} className={`flex-1 py-1.5 rounded text-sm font-medium transition ${resourceUploadType === 'link' ? 'bg-white/10 text-white' : 'text-zinc-500 hover:text-zinc-300'}`}>Lien Web</button>
            </div>
 
          <form onSubmit={handleSaveResource} className="space-y-4">
              {resourceUploadType === 'file' ? (
                <div className="border-2 border-dashed border-white/10 rounded-xl p-8 text-center hover:border-emerald-500/50 transition-colors group relative cursor-pointer">
                  <input type="file" required onChange={(e) => setResourceFile(e.target.files[0])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                  <div className="flex flex-col items-center gap-2">
                    <div className="p-3 bg-white/5 rounded-full group-hover:text-emerald-500 transition-colors text-zinc-400">
                      <DownloadCloud size={24} />
                    </div>
                    {resourceFile ? (
                      <p className="text-sm text-emerald-400 font-medium">{resourceFile.name}</p>
                    ) : (
                      <>
                        <p className="text-sm font-medium text-white">Cliquez pour choisir un fichier</p>
                        <p className="text-xs text-zinc-500">PDF, Images (Max 3MB pour la démo)</p>
                      </>
                    )}
                  </div>
                </div>
              ) : (
                <>
                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Nom du lien</label>
                    <input autoFocus required type="text" placeholder="Ex: Playlist Lofi YouTube..." value={resourceForm.name} onChange={e=>setResourceForm({...resourceForm, name: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white focus:border-emerald-500/50" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">URL du lien</label>
                    <input required type="url" placeholder="https://..." value={resourceForm.url} onChange={e=>setResourceForm({...resourceForm, url: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white focus:border-emerald-500/50" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Type de contenu</label>
                    <select value={resourceForm.type} onChange={e=>setResourceForm({...resourceForm, type: e.target.value})} className="w-full bg-black/30 border border-white/5 rounded-lg px-3 py-2 outline-none text-white appearance-none">
                      <option value="link">Article / Page Web</option>
                      <option value="video">Lien Vidéo (YouTube...)</option>
                    </select>
                  </div>
                </>
              )}
      
            <div className="flex gap-2 justify-end pt-2">
                <button type="button" onClick={() => setIsResourceModalOpen(false)} className="px-4 py-2 text-sm text-zinc-400 hover:text-white transition">Annuler</button>
                <button type="submit" className="px-4 py-2 text-sm bg-emerald-500 text-black font-semibold rounded-lg hover:bg-emerald-400 transition shadow-[0_0_15px_rgba(16,185,129,0.2)]">Ajouter</button>
              </div>
            </form>
          </div>
        </div>
      )}
      
    {/* Styles globaux */}
      <style dangerouslySetInnerHTML={{__html: `
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animation-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background:#27272a;mso-highlight:#27272a; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background:#3f3f46;mso-highlight:#3f3f46; }
      `}} />
    </div>
  );
};

export default function App() {
  const [isAuthenticated, setIsAuthenticated] = useState(() => !!localStorage.getItem('au_current_user'));
  if (!isAuthenticated) {
    return <AuthScreen onLogin={() => setIsAuthenticated(true)} />;
  }
  
return <MainApp onLogout={() => {
    localStorage.removeItem('au_current_user');
    setIsAuthenticated(false);
  }} />;
}

// ==========================================
// FIN DE VOTRE CODE EXACT
// INITIALISATION REACT POUR LE NAVIGATEUR :
// ==========================================

const root = createRoot(document.getElementById('root'));
root.render(<App />);

    </script>
</body>
</html>
